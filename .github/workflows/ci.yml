name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: pytest --cov=godot_ai --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint
        run: ruff check src/ tests/

  release-smoke:
    name: Release smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel in a clean venv
        shell: bash
        run: |
          venv="${RUNNER_TEMP}/smoke-venv"
          python -m venv "$venv"
          if [ -x "$venv/bin/python" ]; then
            PY="$venv/bin/python"
            GODOT_AI="$venv/bin/godot-ai"
          else
            PY="$venv/Scripts/python.exe"
            GODOT_AI="$venv/Scripts/godot-ai.exe"
          fi
          # Use `python -m pip` rather than the pip executable — on Windows,
          # pip.exe can't replace itself mid-upgrade, which breaks smoke tests.
          "$PY" -m pip install dist/*.whl
          "$GODOT_AI" --version
          "$GODOT_AI" --help

      - name: Install built sdist in a clean venv
        shell: bash
        run: |
          venv="${RUNNER_TEMP}/smoke-sdist-venv"
          python -m venv "$venv"
          if [ -x "$venv/bin/python" ]; then
            PY="$venv/bin/python"
            GODOT_AI="$venv/bin/godot-ai"
          else
            PY="$venv/Scripts/python.exe"
            GODOT_AI="$venv/Scripts/godot-ai.exe"
          fi
          "$PY" -m pip install dist/*.tar.gz
          "$GODOT_AI" --version

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  godot-tests-linux:
    name: Godot tests / Linux
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        timeout-minutes: 5
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv curl > /dev/null
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server /tmp/venv/bin/python

      - name: Start Godot editor (headless)
        run: |
          timeout 30 godot --headless --path test_project --import || true
          timeout 120 godot --headless --path test_project --editor &

      - name: Run handler tests
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        run: bash script/ci-reload-test

      - name: Quit smoke test
        run: bash script/ci-quit-test

  godot-tests-macos:
    name: Godot tests / macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server

      - name: Start Godot editor (headless)
        run: |
          godot --headless --path test_project --import || true
          godot --headless --path test_project --editor &

      - name: Run handler tests
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        run: bash script/ci-reload-test

      - name: Quit smoke test
        run: bash script/ci-quit-test

  godot-tests-windows:
    name: Godot tests / Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        shell: bash
        run: bash script/ci-start-server

      - name: Start Godot editor (headless)
        shell: bash
        run: |
          godot --headless --path test_project --import || true
          godot --headless --path test_project --editor &

      - name: Run handler tests
        shell: bash
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        shell: bash
        run: bash script/ci-reload-test
