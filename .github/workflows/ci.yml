name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Deliberately Linux-only: the Python server is pure-async with no
        # platform-specific code. Real OS regressions are caught by the
        # release-smoke and godot-tests jobs, which still run on all 3 OSes.
        # See issue #35 before restoring the full matrix.
        os: [ubuntu-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: pytest --cov=godot_ai --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint
        run: ruff check src/ tests/

  release-smoke:
    name: Release smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel in a clean venv
        shell: bash
        run: |
          venv="${RUNNER_TEMP}/smoke-venv"
          python -m venv "$venv"
          if [ -x "$venv/bin/python" ]; then
            PY="$venv/bin/python"
            GODOT_AI="$venv/bin/godot-ai"
          else
            PY="$venv/Scripts/python.exe"
            GODOT_AI="$venv/Scripts/godot-ai.exe"
          fi
          # Use `python -m pip` rather than the pip executable — on Windows,
          # pip.exe can't replace itself mid-upgrade, which breaks smoke tests.
          "$PY" -m pip install dist/*.whl
          "$GODOT_AI" --version
          "$GODOT_AI" --help

      - name: Install built sdist in a clean venv
        shell: bash
        run: |
          venv="${RUNNER_TEMP}/smoke-sdist-venv"
          python -m venv "$venv"
          if [ -x "$venv/bin/python" ]; then
            PY="$venv/bin/python"
            GODOT_AI="$venv/bin/godot-ai"
          else
            PY="$venv/Scripts/python.exe"
            GODOT_AI="$venv/Scripts/godot-ai.exe"
          fi
          "$PY" -m pip install dist/*.tar.gz
          "$GODOT_AI" --version

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  godot-tests-linux:
    name: Godot tests / Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build plugin symlink
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server

      - name: Import and validate GDScript
        timeout-minutes: 3
        run: |
          godot --headless --path test_project --import > /tmp/godot-import.log 2>&1 || true
          bash script/ci-check-gdscript /tmp/godot-import.log

      - name: Start Godot editor (headless)
        run: GODOT_AI_ALLOW_HEADLESS=1 godot --headless --path test_project --editor &

      - name: Run handler tests
        timeout-minutes: 3
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        timeout-minutes: 2
        run: bash script/ci-reload-test

      - name: Quit smoke test
        timeout-minutes: 2
        run: bash script/ci-quit-test

  # Separate job from godot-tests-*: the capture smoke test needs a real
  # rendering driver (null RenderingDevice in --headless produces empty
  # framebuffers) and a display server. Linux uses xvfb-run; macOS and
  # Windows CI runners have a real graphics stack and run the editor
  # windowed. This job verifies editor_screenshot(source="game") round-
  # trips real game pixels — see closes #72.
  game-capture-smoke-linux:
    name: Game capture smoke / Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build plugin symlink
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server

      - name: Import project
        timeout-minutes: 3
        run: godot --headless --path test_project --import || true

      - name: Start Godot editor with rendering driver
        run: |
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            godot --rendering-driver opengl3 --path test_project --editor &

      - name: Run capture smoke test
        timeout-minutes: 5
        run: python script/ci-game-capture-smoke

  game-capture-smoke-macos:
    name: Game capture smoke / macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build plugin symlink
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server

      - name: Import project
        run: godot --headless --path test_project --import || true

      - name: Start Godot editor
        run: godot --path test_project --editor &

      - name: Run capture smoke test
        timeout-minutes: 5
        run: python script/ci-game-capture-smoke

  game-capture-smoke-windows:
    name: Game capture smoke / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build plugin junction
        shell: bash
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        shell: bash
        run: bash script/ci-start-server

      - name: Import project
        shell: bash
        run: godot --headless --path test_project --import || true

      - name: Start Godot editor
        shell: bash
        run: godot --path test_project --editor &

      - name: Run capture smoke test
        timeout-minutes: 5
        shell: bash
        run: python script/ci-game-capture-smoke

  godot-tests-macos:
    name: Godot tests / macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build plugin symlink
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        run: bash script/ci-start-server

      - name: Start Godot editor (headless)
        run: |
          godot --headless --path test_project --import || true
          GODOT_AI_ALLOW_HEADLESS=1 godot --headless --path test_project --editor &

      - name: Run handler tests
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        run: bash script/ci-reload-test

      - name: Quit smoke test
        run: bash script/ci-quit-test

  godot-tests-windows:
    name: Godot tests / Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build plugin junction
        shell: bash
        run: bash script/verify-worktree

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start MCP server
        shell: bash
        run: bash script/ci-start-server

      - name: Start Godot editor (headless)
        shell: bash
        run: |
          godot --headless --path test_project --import || true
          GODOT_AI_ALLOW_HEADLESS=1 godot --headless --path test_project --editor &

      - name: Run handler tests
        shell: bash
        run: bash script/ci-godot-tests

      - name: Reload smoke test
        shell: bash
        run: bash script/ci-reload-test
