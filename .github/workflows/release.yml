name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Publish the Python server package to PyPI FIRST so that by the time the
  # plugin ZIP is released and users self-update, the matching Python package
  # is already available on PyPI for `uvx --from godot-ai~=<version> godot-ai`
  # to resolve.
  #
  # Uses PyPI Trusted Publishing (OIDC) — no API tokens / secrets required.
  # Requires a one-time pending-publisher setup on PyPI (see README or the
  # PR description).
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "ERROR: tag ($tag) does not match pyproject.toml version ($pkg)" >&2
            exit 1
          fi
          echo "Tag and package version match: $tag"

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Build the Godot plugin ZIP and attach it to the GitHub Release.
  # Runs after publish-pypi so the Python package is live on PyPI before the
  # plugin ZIP download becomes available — prevents a racing user from
  # installing the plugin and having uvx fail to resolve the Python package.
  build-plugin-zip:
    runs-on: ubuntu-latest
    needs: publish-pypi

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        # Wrap in an outer "godot-ai-plugin/" folder so Godot's AssetLib
        # "Ignore asset root" default (which strips the zip's single top-level
        # folder) removes the wrapper instead of addons/. A zip whose top
        # entry is addons/ itself gets addons/ stripped on install, landing
        # godot_ai/ at res:// outside the plugin path — the plugin never
        # registers and scripts fail strict-warning parsing outside addons/.
        run: |
          mkdir -p staging/godot-ai-plugin/addons
          cp -r plugin/addons/godot_ai staging/godot-ai-plugin/addons/
          cd staging
          zip -r ../godot-ai-plugin.zip godot-ai-plugin/

      - name: Verify zip structure
        run: |
          top=$(unzip -l godot-ai-plugin.zip | awk 'NR>3 && $NF!="" {print $NF}' | awk -F/ '{print $1}' | sort -u)
          if [ "$top" != "godot-ai-plugin" ]; then
            echo "ERROR: expected single top-level folder 'godot-ai-plugin/' in zip, got:" >&2
            echo "$top" >&2
            exit 1
          fi
          if ! unzip -l godot-ai-plugin.zip | grep -q 'godot-ai-plugin/addons/godot_ai/plugin.cfg'; then
            echo "ERROR: plugin.cfg not at expected path godot-ai-plugin/addons/godot_ai/plugin.cfg" >&2
            exit 1
          fi
          echo "Zip structure verified: godot-ai-plugin/addons/godot_ai/..."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: godot-ai-plugin.zip
          generate_release_notes: true
